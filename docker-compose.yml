services:
  postgres:
    image: postgres:15-alpine
    container_name: csgo-tracker-db
    environment:
      POSTGRES_DB: csgo_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: csgo-tracker-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: